<!DOCTYPE html>
<html>
<head>
    <title>College Admission Registration</title>
</head>

<body bgcolor="#e6e6fa">

    <center>
        <h2>College Admission Registration</h2>

        <form>
            <table border="1" cellpadding="8" cellspacing="0" bgcolor="#f2f2f2">
                
                <tr>
                    <td><label for="name">Full Name:</label></td>
                    <td><input type="text" id="name" name="name" size="30"></td>
                </tr>

                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" size="30"></td>
                </tr>

                <tr>
                    <td><label for="phone">Phone Number:</label></td>
                    <td><input type="tel" id="phone" name="phone" size="30"></td>
                </tr>

                <tr>
                    <td>Gender:</td>
                    <td>
                        <input type="radio" name="gender" value="male"> Male
                        <input type="radio" name="gender" value="female"> Female
                        <input type="radio" name="gender" value="other"> Other
                    </td>
                </tr>

                <tr>
                    <td>Course Applying For:</td>
                    <td>
                        <select name="course">
                            <option>B.Tech</option>
                            <option>B.Sc</option>
                            <option>B.Com</option>
                            <option>BBA</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Hobbies:</td>
                    <td>
                        <input type="checkbox" name="hobby" value="sports"> Sports
                        <input type="checkbox" name="hobby" value="music"> Music
                        <input type="checkbox" name="hobby" value="reading"> Reading
                    </td>
                </tr>

                <tr>
                    <td><label for="dob">Date of Birth:</label></td>
                    <td><input type="date" id="dob" name="dob"></td>
                </tr>

                <tr>
                    <td>Upload Certificates:</td>
                    <td><input type="file" name="certificate"></td>
                </tr>

                <tr>
                    <td><label for="address">Address:</label></td>
                    <td>
                        <textarea id="address" name="address" rows="4" cols="30"></textarea>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>

            </table>
        </form>
    </center>

</body>
</html>
